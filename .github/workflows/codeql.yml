# Run CodeQL Analysis on the repository.
# https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/codeql-code-scanning-for-compiled-languages
name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]
  schedule:
    - cron: '28 20 * * 1'
  workflow_dispatch:

jobs:
  # Determine which paths changed so CodeQL jobs only run when relevant.
  detect-changes:
    name: detect-changes
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
      dotnet: ${{ steps.filter.outputs.dotnet }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check changed paths
      id: filter
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
        else
          BASE="${{ github.event.before }}"
        fi

        CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD)

        if echo "$CHANGED" | grep -q '^native/'; then
          echo "native=true" >> "$GITHUB_OUTPUT"
        else
          echo "native=false" >> "$GITHUB_OUTPUT"
        fi

        if echo "$CHANGED" | grep -qE '\.(c|cpp|h|hpp)$' | grep -q '^native/'; then
          echo "native_c_cpp=true" >> "$GITHUB_OUTPUT"
        else
          # Check more carefully for C/C++ files under native/
          if echo "$CHANGED" | grep -q '^native/.*\.\(c\|cpp\|h\|hpp\)$'; then
            echo "native_c_cpp=true" >> "$GITHUB_OUTPUT"
          else
            echo "native_c_cpp=false" >> "$GITHUB_OUTPUT"
          fi
        fi

        if echo "$CHANGED" | grep -qE '\.(cs|csproj|sln)$|\.props$|\.targets$|Directory\.Build|Directory\.Packages'; then
          echo "dotnet=true" >> "$GITHUB_OUTPUT"
        else
          echo "dotnet=false" >> "$GITHUB_OUTPUT"
        fi

  analyze-csharp:
    name: codeql-csharp
    needs: [ detect-changes ]
    if: ${{ github.event_name == 'schedule' || needs.detect-changes.outputs.dotnet == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'csharp'
        queries: security-extended,security-and-quality

    - name: Build debug
      run: dotnet build --verbosity normal CoseSignTool.sln

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:csharp"

  analyze-rust:
    name: Analyze (rust, ubuntu-latest)
    needs: [ detect-changes ]
    if: ${{ github.event_name == 'schedule' || needs.detect-changes.outputs.native == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'rust'
        build-mode: none
        queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:rust"

  analyze-cpp:
    name: Analyze (c-cpp, ubuntu-latest)
    needs: [ detect-changes ]
    if: ${{ github.event_name == 'schedule' || needs.detect-changes.outputs.native_c_cpp == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'c-cpp'
        build-mode: none
        queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"
